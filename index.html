<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bulut Mühendisliği Yolculuğu</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { margin-bottom: 10px; font-size: 2.5rem; }
        p { font-size: 1.2rem; color: #e0e0e0; }
        .badge {
            background-color: #ff9900;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">AWS EC2 SUNUCUSU CANLI</span>
        <h1>Bulut Mühendisliğinde İlk Günler! 🚀</h1>
        <p>Bu site, Amazon Linux terminalindeki <b>Nano</b> editörü ile canlı canlı yazıldı.</p>
        <p>Hedef: 180 Gün Disiplini ve Başarı!</p>
    </div>
</body>
</html>
